name: serverpod_cloud_cli
version: 0.8.1
description: A CLI tool from Serverpod used to deploy and manage Serverpod Cloud projects.
repository: https://github.com/serverpod/serverpod_cloud_clients
homepage: https://serverpod.dev
issue_tracker: https://github.com/serverpod/serverpod_cloud_clients/issues

topics:
  - cli
  - serverpod
  - cloud

environment:
  # Note, this range must include all the supported customer Dart SDK versions.
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  archive: ^3.6.1
  args: ^2.6.0
  basic_utils: ^5.7.0
  cli_tools: ^0.6.1
  collection: ^1.19.0
  meta: ^1.16.0
  path: ^1.8.2
  pool: ^1.5.1
  pub_semver: ^2.1.0
  pubspec_parse: ^1.5.0
  ground_control_client: ^0.8.1
  rfc_6901: ^0.2.0
  yaml_codec: ^1.0.0
  yaml: ^3.1.0
  email_validator: ^3.0.0
  dio: ^5.8.0+1

dev_dependencies:
  http: ^1.2.2
  test: ^1.24.0
  uuid: ^4.1.0
  mocktail: ^1.0.4
  test_descriptor: ^2.0.0

dependency_overrides:

  # Temporary GitHub serverpod overrides until new auth is published:
  serverpod_client: 
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: packages/serverpod_client
  serverpod_serialization:
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: packages/serverpod_serialization
  serverpod_auth_client:
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: modules/serverpod_auth/serverpod_auth_client
  serverpod_auth_idp_client:
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: modules/new_serverpod_auth/serverpod_auth_idp/serverpod_auth_idp_client
  serverpod_auth_core_client:
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: modules/new_serverpod_auth/serverpod_auth_core/serverpod_auth_core_client
  serverpod_auth_migration_client:
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: modules/new_serverpod_auth/serverpod_auth_migration/serverpod_auth_migration_client
  serverpod_auth_bridge_client:
    git:
      url: https://github.com/serverpod/serverpod.git
      ref: 3.0.0-alpha.1
      path: modules/new_serverpod_auth/serverpod_auth_bridge/serverpod_auth_bridge_client

executables:
  scloud: serverpod_cloud_cli
